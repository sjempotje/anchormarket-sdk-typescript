name: Generate SDK

on:
  workflow_dispatch:
    inputs:
      generator:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      source_version:
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download OpenAPI spec from release
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.SDK_REPO_TOKEN }}" \
            -H "Accept: application/json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "https://api.github.com/repos/${{ inputs.source_repo }}/releases/tags/${{ inputs.source_version }}" \
            | jq -r '.assets[] | select(.name == "AnchorMarket.Api.json") | .url' \
            | xargs -I{} curl -L -H "Authorization: Bearer ${{ secrets.SDK_REPO_TOKEN }}" -H "Accept: application/octet-stream" -H "X-GitHub-Api-Version: 2026-03-10" {} -o openapi.json

      - name: Install OpenAPI Generator
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Generate SDK
        run: |
          openapi-generator-cli generate \
            -i openapi.json \
            -g ${{ inputs.generator }} \
            -o generated

      - name: Create branch
        run: |
          BRANCH=sdk-update-${{ inputs.source_version }}
          git checkout -b $BRANCH
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Commit changes
        run: |
          cp -r generated/. ./
          npm pkg set name="@anchormarket/anchormarket-sdk-typescript"
          npm pkg set version="${{ inputs.source_version }}"
          npm pkg set publishConfig.registry="https://npm.pkg.github.com"
          git config user.name "sdk-bot"
          git config user.email "sdk-bot@users.noreply.github.com"
          git add .
          git commit -m "chore: regenerate SDK from ${{ inputs.source_version }}" || exit 0

      - name: Push branch
        run: |
          git push -f origin $BRANCH

      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "chore: regenerate SDK",
              head: process.env.BRANCH,
              base: "main",
              body: "Auto-generated SDK from `${{ inputs.source_repo }}@${{ inputs.source_version }}`"
            });